<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="page-title">Резюме</title>
    <link rel="icon" type="image/png" href="/img/favicon.png">
    <style>
        :root {
            --sidebar-bg: #1e293b;
            --sidebar-text: #f8fafc;
            --main-bg: #ffffff;
            --main-text: #334155;
            --heading-color: #0f172a;
            --accent-blue: #2563eb;
            --accent-light: #eff6ff;
            --accent-gray: #64748b;
            --line-color: #cbd5e1;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
            background-color: #f1f5f9;
            margin: 0;
            padding: 0;
            line-height: 1.6;
            color: var(--main-text);
        }

        .resume-wrapper {
            max-width: 1100px;
            margin: 40px auto;
            display: flex;
            background: var(--main-bg);
            box-shadow: 0 10px 40px rgba(0,0,0,0.08);
            border-radius: 8px;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 32%;
            background-color: var(--sidebar-bg);
            color: var(--sidebar-text);
            padding: 40px 30px;
            box-sizing: border-box;
        }

        .photo-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .photo {
            width: 170px;
            height: 170px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid var(--accent-blue);
        }

        .sidebar h3 {
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            border-bottom: 2px solid #334155;
            padding-bottom: 8px;
            margin-top: 35px;
            margin-bottom: 15px;
            color: #93c5fd;
            font-weight: 600;
        }

        .contact-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .contact-list li {
            font-size: 14px;
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .contact-list strong {
            color: #94a3b8;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 2px;
        }

        .contact-list a {
            color: var(--sidebar-text);
            text-decoration: none;
            transition: color 0.2s;
        }

        .contact-list a:hover {
            color: #93c5fd;
        }

        .skill-group {
            margin-bottom: 20px;
        }

        .skill-category {
            font-size: 12px;
            text-transform: uppercase;
            color: #94a3b8;
            font-weight: 700;
            display: block;
            margin-bottom: 6px;
            letter-spacing: 0.5px;
        }

        .skill-items {
            font-size: 14px;
            line-height: 1.5;
            color: #f1f5f9;
        }

        /* --- MAIN CONTENT --- */
        .main-content {
            width: 68%;
            padding: 50px;
            box-sizing: border-box;
        }

        .header h1 {
            font-size: 36px;
            margin: 0;
            color: var(--heading-color);
            letter-spacing: 0.5px;
            line-height: 1.2;
        }

        .header h2 {
            font-size: 20px;
            color: var(--accent-blue);
            font-weight: 500;
            margin: 8px 0 25px 0;
        }

        .section-title {
            font-size: 20px;
            color: var(--heading-color);
            text-transform: uppercase;
            border-left: 4px solid var(--accent-blue);
            padding-left: 15px;
            margin-bottom: 20px;
            margin-top: 40px;
            font-weight: 700;
            background: var(--accent-light);
            padding-top: 5px;
            padding-bottom: 5px;
            border-radius: 0 4px 4px 0;
        }

        .summary {
            font-size: 15px;
            color: var(--main-text);
            text-align: justify;
            margin-bottom: 15px;
        }

        .item {
            margin-bottom: 40px;
        }

        .item-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }

        .item-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--heading-color);
        }

        .item-date {
            font-size: 14px;
            color: var(--accent-gray);
            font-weight: 600;
            background-color: var(--accent-light);
            padding: 4px 10px;
            border-radius: 20px;
            border: 1px solid #bfdbfe;
        }

        .item-role {
            font-size: 16px;
            font-weight: 600;
            color: var(--accent-blue);
            margin-bottom: 12px;
            display: block;
        }

        .item-description {
            font-size: 15px;
            color: var(--main-text);
            margin-bottom: 15px;
            line-height: 1.6;
            background: #f8fafc;
            padding: 12px 16px;
            border-left: 3px solid #cbd5e1;
            border-radius: 0 6px 6px 0;
            font-style: italic;
        }

        .subsection-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--heading-color);
            margin-top: 18px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: inline-block;
            border-bottom: 2px solid var(--accent-light);
            padding-bottom: 4px;
        }

        .item ul {
            padding-left: 0;
            margin-top: 0;
            margin-bottom: 20px;
            list-style: none;
        }

        .item ul li {
            font-size: 14.5px;
            margin-bottom: 10px;
            color: var(--main-text);
            position: relative;
            padding-left: 18px;
            line-height: 1.5;
        }

        /* Делаем маркеры тонкими линиями (тире) вместо жирных точек */
        .item ul li::before {
            content: '—';
            position: absolute;
            left: 0;
            color: var(--accent-gray); /* Сделал цвет серым, чтобы он не так бросался в глаза */
        }

        .tag-container {
            margin-top: 10px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .tag {
            display: inline-block;
            background: var(--accent-light);
            padding: 4px 10px;
            border-radius: 6px;
            font-size: 12px;
            color: var(--accent-blue);
            font-weight: 500;
            border: 1px solid #bfdbfe;
        }

        .btn-download {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background-color: var(--accent-blue);
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            margin-right: 15px;
            margin-bottom: 10px;
            transition: background-color 0.2s, transform 0.1s;
            box-shadow: 0 4px 6px rgba(37, 99, 235, 0.2);
        }

        .btn-download:hover {
            background-color: #1d4ed8;
            transform: translateY(-2px);
        }

        .btn-download:active {
            transform: translateY(0);
        }

        .btn-download svg {
            margin-right: 8px;
            width: 18px;
            height: 18px;
            fill: currentColor;
        }

@media print {
    * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
    }

    body {
        background: white;
        margin: 0;
        padding: 0;
    }

    .resume-wrapper {
        box-shadow: none;
        margin: 0;
        width: 100%;
        max-width: 100%;
        border-radius: 0;
    }

    .sidebar {
        background-color: var(--sidebar-bg) !important;
        color: white !important;
    }

    .section-title {
        background-color: var(--accent-light) !important;
        border-left: 4px solid var(--accent-blue) !important;
        border-bottom: none !important;
        padding-left: 15px !important;
    }

    .tag {
        background-color: var(--accent-light) !important;
        border: 1px solid #bfdbfe !important;
    }

    .item-date {
        background-color: var(--accent-light) !important;
        border: 1px solid #bfdbfe !important;
    }

    .item-description {
        background-color: #f8fafc !important;
    }

    .downloads-section {
        display: none !important;
    }
}
    </style>
</head>
<body>

<div class="resume-wrapper">
    <aside class="sidebar">
        <div class="photo-container">
            <img id="photo" src="" alt="Мое фото" class="photo">
        </div>

        <h3 id="contacts-title"></h3>
        <ul class="contact-list" id="contacts-list">
        </ul>

        <h3 id="education-title"></h3>
        <ul class="contact-list" id="education-list">
        </ul>

        <h3 id="courses-title"></h3>
        <ul class="contact-list" id="courses-list">
        </ul>

        <h3 id="skills-title"></h3>
        <div id="skills-list">
        </div>

    </aside>

    <main class="main-content">
        <div class="header">
            <h1 id="name"></h1>
            <h2 id="role"></h2>
        </div>

        <div class="section-title" id="about-title"></div>
        <div id="about-list"></div>

        <div class="section-title" id="experience-title"></div>
        <div id="experience-list"></div>

        <div class="section-title" id="projects-title"></div>
        <div id="projects-list"></div>

        <div class="downloads-section" style="margin-top: 40px; border-top: 1px solid var(--line-color); padding-top: 25px;" id="downloads-list">
        </div>
    </main>
</div>

<script src="data.js"></script>
<script>
    document.addEventListener("DOMContentLoaded", () => {
        document.getElementById("page-title").textContent = cvData.title;
        document.getElementById("photo").src = cvData.photoUrl;

        // Contacts
        document.getElementById("contacts-title").textContent = cvData.contactsTitle;
        const contactsList = document.getElementById("contacts-list");
        cvData.contacts.forEach(contact => {
            const li = document.createElement("li");
            let valueHtml = contact.value;
            if (contact.href) {
                valueHtml = `<a href="${contact.href}">${contact.value}</a>`;
            }
            li.innerHTML = `<strong>${contact.label}</strong>${valueHtml}`;
            contactsList.appendChild(li);
        });

        // Education
        document.getElementById("education-title").textContent = cvData.educationTitle;
        const educationList = document.getElementById("education-list");
        cvData.education.forEach(edu => {
            const li = document.createElement("li");
            li.innerHTML = `
                <strong>${edu.years}</strong>
                ${edu.institution}<br>
                ${edu.level}<br>
                <em>${edu.specialty}</em>
            `;
            educationList.appendChild(li);
        });

        // Courses
        if (cvData.courses && cvData.courses.length) {
            document.getElementById("courses-title").textContent = cvData.coursesTitle;
            const coursesList = document.getElementById("courses-list");
            cvData.courses.forEach(course => {
                const li = document.createElement("li");
                li.innerHTML = `<strong>${course.year}</strong>${course.name}`;
                coursesList.appendChild(li);
            });
        }

        // Skills
        document.getElementById("skills-title").textContent = cvData.skillsTitle;
        const skillsList = document.getElementById("skills-list");
        cvData.skills.forEach(skill => {
            const div = document.createElement("div");
            div.className = "skill-group";
            div.innerHTML = `
                <span class="skill-category">${skill.category}</span>
                <span class="skill-items">${skill.items}</span>
            `;
            skillsList.appendChild(div);
        });

        // Header
        document.getElementById("name").textContent = cvData.name;
        document.getElementById("role").textContent = cvData.role;

        // About
        document.getElementById("about-title").textContent = cvData.aboutTitle;
        const aboutList = document.getElementById("about-list");
        cvData.about.forEach(paragraph => {
            const p = document.createElement("p");
            p.className = "summary";
            p.textContent = paragraph;
            aboutList.appendChild(p);
        });

        // Experience
        document.getElementById("experience-title").textContent = cvData.experienceTitle;
        const experienceList = document.getElementById("experience-list");
        cvData.experience.forEach(exp => {
            const expDiv = document.createElement("div");
            expDiv.className = "item";

            // 1. Header (Company + Period)
            let contentHtml = `
                <div class="item-header">
                    <span class="item-title">${exp.company}</span>
                    <span class="item-date">${exp.period}</span>
                </div>
            `;

            // 2. Role
            contentHtml += `<span class="item-role">${exp.role}</span>`;

            // 3. Tags (Stack)
            if (exp.stack && exp.stack.length > 0) {
                let tagsHtml = "";
                exp.stack.forEach(tag => {
                    tagsHtml += `<span class="tag">${tag}</span>`;
                });
                contentHtml += `<div class="tag-container">${tagsHtml}</div>`;
            }

            // 4. Description (optional)
            if (exp.description) {
                contentHtml += `<div class="item-description">${exp.description}</div>`;
            }

            // 5. Sections (Technical & Business Results)
            exp.sections.forEach(sec => {
                let itemsHtml = "";
                sec.items.forEach(item => {
                    itemsHtml += `<li>${item}</li>`;
                });
                contentHtml += `
                    <div class="subsection-title">${sec.title}</div>
                    <ul>${itemsHtml}</ul>
                `;
            });

            expDiv.innerHTML = contentHtml;
            experienceList.appendChild(expDiv);
        });

        // Projects
        document.getElementById("projects-title").textContent = cvData.projectsTitle;
        const projectsList = document.getElementById("projects-list");
        cvData.projects.forEach(proj => {
            const projDiv = document.createElement("div");
            projDiv.className = "item";
            projDiv.style.marginBottom = "30px";

            let tagsHtml = "";
            proj.tags.forEach(tag => {
                tagsHtml += `<span class="tag">${tag}</span>`;
            });

            projDiv.innerHTML = `
                <div class="item-title" style="margin-bottom: 8px;">${proj.title}</div>
                <div class="tag-container" style="margin-bottom: 12px;">
                    ${tagsHtml}
                </div>
                <p class="summary" style="margin-bottom: 0;">
                    ${proj.description}
                </p>
            `;
            projectsList.appendChild(projDiv);
        });

        // Downloads
        const downloadsList = document.getElementById("downloads-list");
        cvData.downloads.forEach(dl => {
            const a = document.createElement("a");
            a.href = dl.url;
            a.className = "btn-download";
            a.innerHTML = `
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
                    <path d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/>
                </svg>
                ${dl.text}
            `;
            downloadsList.appendChild(a);
        });
    });
</script>
</body>
</html>
